name: Release
on:
  push:
    branches: [main]
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    # Scopes npm Trusted Publishing (OIDC) to this environment. No protection rules, so releases
    # still run automatically on push to main — no manual-approval pause.
    environment: release
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: yarn

      - run: yarn install --immutable

      - run: yarn dedupe --check

      - run: yarn build

      - run: yarn lint
        env:
          TS_NODE_PROJECT: tsconfig.json

      - run: yarn test

      - run: npm audit signatures

      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Publishing uses npm Trusted Publishing (OIDC) via the `release` environment, so no
          # NPM_TOKEN is needed — the secret has been removed.
